name: Deploy to Prod

# Runs automatically on every push to main (i.e. every merged PR), and can
# also be triggered manually from the Actions UI. Either way it must run
# from the main branch.
#
# Required GitHub secrets:
#   PROD_ENV_FILE    — full contents of the local .env.prod file for the prod project
#   GCP_SA_KEY_PROD  — JSON key for the prod project service account

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: UTC

    steps:
      - name: Verify branch is main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Production deployments must run from the main branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env.prod from secret
        env:
          ENV_CONTENT: ${{ secrets.PROD_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env.prod

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Preflight env check
        run: node scripts/check-prod-env.mjs

      - name: Unit tests
        run: npm test

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build:prod

      - name: Write service account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_PROD }}
        run: printf '%s\n' "$GCP_SA_KEY" > "${{ runner.temp }}/gcp-sa-key.json"

      - name: Deploy to prod
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa-key.json
          GCLOUD_PROJECT: basecamp-app-prod
        run: |
          set +e
          out=$(firebase deploy --only hosting,firestore:rules,firestore:indexes --project prod 2>&1)
          code=$?
          printf '%s\n' "$out"
          if [ $code -ne 0 ] && printf '%s\n' "$out" | grep -q 'is the current active version'; then
            deployed=$(printf '%s\n' "$out" | grep -oP '(?<=version `)projects/[^`]+' | tail -1)
            sa_email=$(jq -r '.client_email' "$GOOGLE_APPLICATION_CREDENTIALS")
            sa_key=$(jq -r '.private_key' "$GOOGLE_APPLICATION_CREDENTIALS")
            now=$(date +%s); exp=$((now + 3600))
            hdr=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
            pay=$(printf '{"iss":"%s","scope":"https://www.googleapis.com/auth/cloud-platform","aud":"https://oauth2.googleapis.com/token","exp":%d,"iat":%d}' \
                  "$sa_email" "$exp" "$now" | base64 -w0 | tr '+/' '-_' | tr -d '=')
            tmpkey=$(mktemp); printf '%s' "$sa_key" > "$tmpkey"
            sig=$(printf '%s' "$hdr.$pay" | openssl dgst -sha256 -sign "$tmpkey" 2>/dev/null \
                  | base64 -w0 | tr '+/' '-_' | tr -d '=')
            rm -f "$tmpkey"
            token=$(curl -sf -X POST https://oauth2.googleapis.com/token \
                    -d "grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=$hdr.$pay.$sig" \
                    | jq -r '.access_token')
            active=$(curl -sf -H "Authorization: Bearer $token" \
                     "https://firebasehosting.googleapis.com/v1beta1/projects/-/sites/basecamp-app-prod/channels/live" \
                     | jq -r '.release.version.name // ""')
            if [ -n "$deployed" ] && [ "$deployed" = "$active" ]; then
              echo "::warning::Deploy succeeded — Firebase confirmed version $active is now live. (CLI exited non-zero due to keep-alive retry on the release POST under service-account auth.)"
              exit 0
            fi
          fi
          exit $code
