name: Deploy to Dev

# Label-triggered: add "deploy-to-dev" to a PR to deploy that PR's branch to dev.
# Manual trigger: workflow_dispatch (no label management — no PR context).
#
# Labels used:
#   deploy-to-dev   — trigger label; added by user/Claude, removed automatically on success
#   on-dev          — state label; marks which PR is currently live on dev
#
# Required GitHub secrets:
#   DEV_ENV_FILE     — full contents of the local .env file for the dev project
#   GCP_SA_KEY_DEV   — JSON key for the dev project service account

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'deploy-to-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
    env:
      TZ: UTC
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      - name: Clear on-dev from all other PRs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const currentPR = context.payload.pull_request.number;
            // Search all issues (open + closed) carrying the on-dev label so we
            // clean up PRs that were closed/merged while still tagged on-dev.
            const { data: labeled } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'on-dev',
              state: 'all',
              per_page: 100,
            });
            for (const issue of labeled) {
              if (issue.number === currentPR) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'on-dev',
                });
                console.log(`Removed on-dev from PR #${issue.number}`);
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env from secret
        env:
          ENV_CONTENT: ${{ secrets.DEV_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Preflight env check
        run: node scripts/check-dev-env.mjs

      - name: Build
        run: npm run build

      - name: Write service account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_DEV }}
        run: printf '%s\n' "$GCP_SA_KEY" > "${{ runner.temp }}/gcp-sa-key.json"

      - name: Deploy Firestore rules and indexes to dev
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa-key.json
          GCLOUD_PROJECT: basecamp-app-dev
        run: firebase deploy --only firestore:rules,firestore:indexes --project dev

      - name: Deploy hosting to dev
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY_DEV }}
          projectId: basecamp-app-dev
          channelId: live

      - name: Update PR labels after successful deploy
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                name: 'deploy-to-dev',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
              console.log('deploy-to-dev already removed, continuing');
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              labels: ['on-dev'],
            });
            console.log(`PR #${pr}: removed deploy-to-dev, added on-dev`);
