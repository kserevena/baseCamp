name: Deploy to Prod

# Runs automatically on every push to main (i.e. every merged PR), and can
# also be triggered manually from the Actions UI. Either way it must run
# from the main branch.
#
# Required GitHub secrets:
#   PROD_ENV_FILE    — full contents of the local .env.prod file for the prod project
#   GCP_SA_KEY_PROD  — JSON key for the prod project service account

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: UTC

    steps:
      - name: Verify branch is main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Production deployments must run from the main branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env.prod from secret
        env:
          ENV_CONTENT: ${{ secrets.PROD_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env.prod

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Preflight env check
        run: node scripts/check-prod-env.mjs

      - name: Unit tests
        run: npm test

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build:prod

      - name: Write service account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_PROD }}
        run: printf '%s\n' "$GCP_SA_KEY" > "${{ runner.temp }}/gcp-sa-key.json"

      - name: Deploy to prod
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa-key.json
          GCLOUD_PROJECT: basecamp-app-prod
        run: firebase deploy --only hosting,firestore:rules,firestore:indexes --project prod
