name: Deploy to Dev

# Manual trigger only.
#
# Required GitHub secrets:
#   DEV_ENV_FILE     — full contents of the local .env file for the dev project
#   FIREBASE_TOKEN   — CI token from `firebase login:ci`

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: UTC

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env from secret
        env:
          ENV_CONTENT: ${{ secrets.DEV_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Preflight env check
        run: node scripts/check-dev-env.mjs

      - name: Build
        run: npm run build

      - name: Deploy to dev
        run: firebase deploy --only hosting,firestore:rules,firestore:indexes --project dev
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
