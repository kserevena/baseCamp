name: Deploy to Dev

# Label-triggered: add "deploy-to-dev" to a PR to deploy that PR's branch to dev.
# Manual trigger: workflow_dispatch (no label management — no PR context).
# Synchronize-triggered: pushing a new commit to a PR that carries "on-dev" removes
# the label, since dev would otherwise falsely appear to be running the new HEAD.
#
# Labels used:
#   deploy-to-dev   — trigger label; added by user/Claude, removed automatically on success
#   on-dev          — state label; marks which PR is currently live on dev
#
# Required GitHub secrets:
#   DEV_ENV_FILE     — full contents of the local .env file for the dev project
#   GCP_SA_KEY_DEV   — JSON key for the dev project service account

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:

jobs:
  remove-stale-on-dev-label:
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove on-dev label if present
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.labels.some(label => label.name === 'on-dev')) return;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: 'on-dev',
              });
              console.log(`PR #${pr.number}: removed stale on-dev label after new commit`);
            } catch (e) {
              if (e.status !== 404) throw e;
            }

  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'deploy-to-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      TZ: UTC
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      - name: Clear on-dev from all other PRs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const currentPR = context.payload.pull_request.number;
            // Search all issues (open + closed) carrying the on-dev label so we
            // clean up PRs that were closed/merged while still tagged on-dev.
            const { data: labeled } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'on-dev',
              state: 'all',
              per_page: 100,
            });
            for (const issue of labeled) {
              if (issue.number === currentPR) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'on-dev',
                });
                console.log(`Removed on-dev from PR #${issue.number}`);
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          # Pinned to 24.18.0: 24.17.0 shipped a keep-alive regression (nodejs/node#63989)
          # that breaks firebase-tools deploys against *.googleapis.com. 24.18.0 fixes it.
          node-version: '24.18.0'
          cache: 'npm'

      - name: Create .env from secret
        env:
          ENV_CONTENT: ${{ secrets.DEV_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Preflight env check
        run: node scripts/check-dev-env.mjs

      - name: Build
        run: npm run build

      - name: Write service account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_DEV }}
        run: printf '%s\n' "$GCP_SA_KEY" > "${{ runner.temp }}/gcp-sa-key.json"

      - name: Deploy to dev
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa-key.json
          GCLOUD_PROJECT: basecamp-app-dev
        run: firebase deploy --only hosting,firestore:rules,firestore:indexes --project dev

      - name: Update PR labels after successful deploy
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                name: 'deploy-to-dev',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
              console.log('deploy-to-dev already removed, continuing');
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              labels: ['on-dev'],
            });
            console.log(`PR #${pr}: removed deploy-to-dev, added on-dev`);
