name: Deploy to Dev

# Manual trigger only.
#
# Required GitHub secrets:
#   DEV_ENV_FILE     — full contents of the local .env file for the dev project
#   FIREBASE_TOKEN   — CI token from `firebase login:ci`

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: UTC
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env from secret
        env:
          ENV_CONTENT: ${{ secrets.DEV_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Integration tests
        run: npm run test:integration

      - name: Preflight env check
        run: node scripts/check-dev-env.mjs

      - name: Build
        run: npm run build

      - name: Deploy to dev
        run: firebase deploy --only hosting,firestore:rules,firestore:indexes --project dev
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
