name: Deploy to Prod

# Manual trigger only. Must be run from the main branch.
#
# Required GitHub secrets:
#   PROD_ENV_FILE    — full contents of the local .env.prod file for the prod project
#   FIREBASE_TOKEN   — CI token from `firebase login:ci`

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: UTC
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Verify branch is main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Production deployments must run from the main branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env.prod from secret
        env:
          ENV_CONTENT: ${{ secrets.PROD_ENV_FILE }}
        run: printf '%s\n' "$ENV_CONTENT" > .env.prod

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Integration tests
        run: npm run test:integration

      - name: Preflight env check
        run: node scripts/check-prod-env.mjs

      - name: Build
        run: npm run build:prod

      - name: Deploy to prod
        run: firebase deploy --only hosting,firestore:rules,firestore:indexes --project prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
